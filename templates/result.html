<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Registration Successful 🎉</h2>

<p>Name: {{name}}</p>
<p>Age: {{age}}</p>
<p>Course: {{course}}</p>

<h3>Total Students Registered: {{total}}</h3>

<h3>Course-wise Count:</h3>
<ul>
    {% for c, count in course_count.items() %}
        <li>{{c}} : {{count}}</li>
    {% endfor %}
</ul>

<a href="/">Go Back</a>

</body>
</html>
